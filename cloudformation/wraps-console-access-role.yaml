AWSTemplateFormatVersion: "2010-09-09"
Description: "Wraps Console Access Role - Grants Wraps dashboard access to send emails/SMS, read CloudWatch metrics, and manage templates"

Parameters:
  ExternalId:
    Type: String
    Description: "External ID for secure role assumption (provided by Wraps)"
    AllowedPattern: "^wraps[_-][a-f0-9-]{32,36}$"
    ConstraintDescription: "External ID must start with wraps_ followed by a UUID or hex string (e.g., wraps_01936f4a-7b8c-7d9e-af12-abcdef012345)"
    NoEcho: true

  WrapsBackendAccountId:
    Type: String
    Description: "AWS Account ID of Wraps Platform"
    Default: "905130073023"
    AllowedPattern: "^[0-9]{12}$"

  EnableEmailArchiving:
    Type: String
    Description: "Enable access to email archives"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  EnableSMSAccess:
    Type: String
    Description: "Enable access to SMS data and metrics"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  EnableInboundEmail:
    Type: String
    Description: "Enable access to inbound email data in S3"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  EnableArchiving: !Equals [!Ref EnableEmailArchiving, "true"]
  EnableSMS: !Equals [!Ref EnableSMSAccess, "true"]
  EnableInbound: !Equals [!Ref EnableInboundEmail, "true"]

Resources:
  # IAM Role that Wraps will assume
  WrapsConsoleAccessRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: "wraps-console-access-role"
      Description: "Allows Wraps dashboard to access CloudWatch metrics and SES data"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${WrapsBackendAccountId}:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      Policies:
        - PolicyName: "wraps-console-access-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Metrics - Read Only
              - Sid: "CloudWatchMetricsReadOnly"
                Effect: Allow
                Action:
                  - "cloudwatch:GetMetricData"
                  - "cloudwatch:GetMetricStatistics"
                  - "cloudwatch:ListMetrics"
                Resource: "*"

              # SES - Read Access
              - Sid: "SESReadAccess"
                Effect: Allow
                Action:
                  - "ses:GetSendQuota"
                  - "ses:GetSendStatistics"
                  - "ses:GetAccount"
                  - "ses:ListIdentities"
                  - "ses:GetIdentityVerificationAttributes"
                  - "ses:GetIdentityDkimAttributes"
                  - "ses:ListEmailIdentities"
                  - "ses:GetEmailIdentity"
                  - "ses:GetConfigurationSet"
                  - "ses:GetConfigurationSetEventDestinations"
                  - "ses:GetDedicatedIps"
                Resource: "*"

              # S3 - Inbound Bucket Feature Detection
              - Sid: "S3InboundBucketDetection"
                Effect: Allow
                Action:
                  - "s3:HeadBucket"
                Resource: !Sub "arn:aws:s3:::wraps-inbound-*"

              # SES - Template Management (for publishing email templates)
              - Sid: "SESTemplateManagement"
                Effect: Allow
                Action:
                  - "ses:GetTemplate"
                  - "ses:ListTemplates"
                  - "ses:CreateTemplate"
                  - "ses:UpdateTemplate"
                  - "ses:DeleteTemplate"
                  - "ses:TestRenderTemplate"
                  - "ses:GetEmailTemplate"
                  - "ses:ListEmailTemplates"
                  - "ses:CreateEmailTemplate"
                  - "ses:UpdateEmailTemplate"
                  - "ses:DeleteEmailTemplate"
                  - "ses:TestRenderEmailTemplate"
                Resource: "*"

              # SES - Send Access
              - Sid: "SESSendAccess"
                Effect: Allow
                Action:
                  - "ses:SendEmail"
                  - "ses:SendRawEmail"
                  - "ses:SendTemplatedEmail"
                  - "ses:SendBulkTemplatedEmail"
                  - "ses:SendBulkEmail" # SES v2 bulk sending
                Resource: "*"

              # DynamoDB - Read Email Events (if using Wraps email tracking)
              - Sid: "DynamoDBReadEmailEvents"
                Effect: Allow
                Action:
                  - "dynamodb:DescribeTable"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                  - "dynamodb:GetItem"
                  - "dynamodb:BatchGetItem"
                Resource:
                  - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-email-*"
                  - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-email-*/index/*"

              # EventBridge - Access for event tracking
              - Sid: "EventBridgeAccess"
                Effect: Allow
                Action:
                  - "events:PutEvents"
                  - "events:DescribeEventBus"
                  - "events:DescribeRule"
                Resource:
                  - !Sub "arn:aws:events:*:${AWS::AccountId}:event-bus/wraps-email-*"
                  - !Sub "arn:aws:events:*:${AWS::AccountId}:rule/wraps-email-events-to-sqs"

              # SQS - Access for event tracking
              - Sid: "SQSAccess"
                Effect: Allow
                Action:
                  - "sqs:SendMessage"
                  - "sqs:ReceiveMessage"
                  - "sqs:DeleteMessage"
                  - "sqs:GetQueueAttributes"
                Resource: !Sub "arn:aws:sqs:*:${AWS::AccountId}:wraps-email-*"

              # SMS Voice V2 - Read Access (conditional)
              - !If
                - EnableSMS
                - Sid: "SMSReadAccess"
                  Effect: Allow
                  Action:
                    - "sms-voice:DescribeAccountAttributes"
                    - "sms-voice:DescribeSpendLimits"
                    - "sms-voice:DescribeConfigurationSets"
                    - "sms-voice:DescribeOptOutLists"
                    - "sms-voice:DescribeOptedOutNumbers"
                    - "sms-voice:DescribePools"
                    - "sms-voice:DescribePhoneNumbers"
                    - "sms-voice:DescribeProtectConfigurations"
                    - "sms-voice:DescribeRegistrations"
                    - "sms-voice:DescribeRegistrationAttachments"
                    - "sms-voice:DescribeRegistrationFieldDefinitions"
                    - "sms-voice:DescribeRegistrationFieldValues"
                    - "sms-voice:DescribeRegistrationSectionDefinitions"
                    - "sms-voice:DescribeRegistrationVersions"
                  Resource: "*"
                - !Ref "AWS::NoValue"

              # SMS - Send Access
              - Sid: "SMSSendAccess"
                Effect: Allow
                Action:
                  - "sms-voice:SendTextMessage"
                  - "sms-voice:SendMediaMessage"
                Resource: "*"

              # DynamoDB - Read SMS Events (conditional, if using Wraps SMS tracking)
              - !If
                - EnableSMS
                - Sid: "DynamoDBReadSMSEvents"
                  Effect: Allow
                  Action:
                    - "dynamodb:DescribeTable"
                    - "dynamodb:Query"
                    - "dynamodb:Scan"
                    - "dynamodb:GetItem"
                    - "dynamodb:BatchGetItem"
                  Resource:
                    - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-sms-*"
                    - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-sms-*/index/*"
                - !Ref "AWS::NoValue"

              # SNS - Read SMS Event Topics (conditional)
              - !If
                - EnableSMS
                - Sid: "SNSReadSMSTopics"
                  Effect: Allow
                  Action:
                    - "sns:GetTopicAttributes"
                    - "sns:ListSubscriptionsByTopic"
                  Resource:
                    - !Sub "arn:aws:sns:*:${AWS::AccountId}:wraps-sms-*"
                - !Ref "AWS::NoValue"

              # S3 - Inbound Email Access (conditional, if using Wraps inbound email)
              - !If
                - EnableInbound
                - Sid: "S3InboundEmailAccess"
                  Effect: Allow
                  Action:
                    - "s3:HeadBucket"
                    - "s3:ListBucket"
                    - "s3:GetObject"
                    - "s3:GetObjectTagging"
                  Resource:
                    - !Sub "arn:aws:s3:::wraps-inbound-*"
                    - !Sub "arn:aws:s3:::wraps-inbound-*/*"
                - !Ref "AWS::NoValue"

              # Mail Manager - Archive Access (conditional, if using Wraps email archiving)
              - !If
                - EnableArchiving
                - Sid: "MailManagerArchiveAccess"
                  Effect: Allow
                  Action:
                    - "ses:StartArchiveSearch"
                    - "ses:GetArchiveSearchResults"
                    - "ses:GetArchiveMessage"
                    - "ses:GetArchiveMessageContent"
                    - "ses:GetArchive"
                    - "ses:ListArchives"
                    - "ses:StartArchiveExport"
                    - "ses:GetArchiveExport"
                  Resource: !Sub "arn:aws:ses:*:${AWS::AccountId}:mailmanager-archive/*"
                - !Ref "AWS::NoValue"
      Tags:
        - Key: ManagedBy
          Value: Wraps
        - Key: Purpose
          Value: "Console Access"

Outputs:
  RoleArn:
    Description: "Paste this into the 'Role ARN' field in the Wraps dashboard"
    Value: !GetAtt WrapsConsoleAccessRole.Arn
    Export:
      Name: "WrapsConsoleAccessRoleArn"

  ExternalId:
    Description: "Keep this secret — it was pre-filled from the Wraps dashboard"
    Value: !Ref ExternalId

  AccountId:
    Description: "Your AWS Account ID"
    Value: !Ref AWS::AccountId

  Region:
    Description: "AWS Region where this stack is deployed"
    Value: !Ref AWS::Region

  Instructions:
    Description: "Next Steps"
    Value: "Copy the RoleArn and return to the Wraps dashboard to complete setup"
