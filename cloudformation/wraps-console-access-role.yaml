AWSTemplateFormatVersion: "2010-09-09"
Description: "Wraps Console Access Role - Grants Wraps dashboard read-only access to CloudWatch metrics, SES email, and SMS data"

Parameters:
  ExternalId:
    Type: String
    Description: "External ID for secure role assumption (provided by Wraps)"
    MinLength: 1
    NoEcho: true

  WrapsBackendAccountId:
    Type: String
    Description: "AWS Account ID of Wraps Platform"
    Default: "905130073023"
    AllowedPattern: "^[0-9]{12}$"

  AllowEmailSending:
    Type: String
    Description: "Allow Wraps to send emails on your behalf (default: false)"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  EnableEmailArchiving:
    Type: String
    Description: "Enable access to email archives (requires Wraps email archiving feature)"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  EnableSMSAccess:
    Type: String
    Description: "Enable access to SMS data and metrics (requires Wraps SMS feature)"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  AllowSMSSending:
    Type: String
    Description: "Allow Wraps to send SMS messages on your behalf (default: false)"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  EnableSending: !Equals [!Ref AllowEmailSending, "true"]
  EnableArchiving: !Equals [!Ref EnableEmailArchiving, "true"]
  EnableSMS: !Equals [!Ref EnableSMSAccess, "true"]
  EnableSMSSend: !Equals [!Ref AllowSMSSending, "true"]

Resources:
  # IAM Role that Wraps will assume
  WrapsConsoleAccessRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: "wraps-console-access-role"
      Description: "Allows Wraps dashboard to access CloudWatch metrics and SES data"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${WrapsBackendAccountId}:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      Policies:
        - PolicyName: "wraps-console-access-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Metrics - Read Only
              - Sid: "CloudWatchMetricsReadOnly"
                Effect: Allow
                Action:
                  - "cloudwatch:GetMetricData"
                  - "cloudwatch:GetMetricStatistics"
                  - "cloudwatch:ListMetrics"
                Resource: "*"

              # SES - Read Access
              - Sid: "SESReadAccess"
                Effect: Allow
                Action:
                  - "ses:GetSendQuota"
                  - "ses:GetSendStatistics"
                  - "ses:GetAccount"
                  - "ses:ListIdentities"
                  - "ses:GetIdentityVerificationAttributes"
                  - "ses:GetIdentityDkimAttributes"
                  - "ses:GetConfigurationSet"
                Resource: "*"

              # SES - Template Management (for publishing email templates)
              - Sid: "SESTemplateManagement"
                Effect: Allow
                Action:
                  - "ses:GetTemplate"
                  - "ses:ListTemplates"
                  - "ses:CreateTemplate"
                  - "ses:UpdateTemplate"
                  - "ses:DeleteTemplate"
                  - "ses:TestRenderTemplate"
                Resource: "*"

              # SES - Send Access (conditional)
              - !If
                - EnableSending
                - Sid: "SESSendAccess"
                  Effect: Allow
                  Action:
                    - "ses:SendEmail"
                    - "ses:SendRawEmail"
                    - "ses:SendTemplatedEmail"
                    - "ses:SendBulkTemplatedEmail"
                    - "ses:SendBulkEmail" # SES v2 bulk sending
                  Resource: "*"
                - !Ref "AWS::NoValue"

              # DynamoDB - Read Email Events (if using Wraps email tracking)
              - Sid: "DynamoDBReadEmailEvents"
                Effect: Allow
                Action:
                  - "dynamodb:DescribeTable"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                  - "dynamodb:GetItem"
                  - "dynamodb:BatchGetItem"
                Resource:
                  - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-email-*"
                  - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-email-*/index/*"

              # EventBridge - Read Email Event Rules (for feature detection)
              - Sid: "EventBridgeReadEmailRules"
                Effect: Allow
                Action:
                  - "events:DescribeRule"
                Resource:
                  - !Sub "arn:aws:events:*:${AWS::AccountId}:rule/wraps-email-events-to-sqs"

              # SMS Voice V2 - Read Access (conditional)
              - !If
                - EnableSMS
                - Sid: "SMSReadAccess"
                  Effect: Allow
                  Action:
                    - "sms-voice:DescribeAccountAttributes"
                    - "sms-voice:DescribeSpendLimits"
                    - "sms-voice:DescribeConfigurationSets"
                    - "sms-voice:DescribeOptOutLists"
                    - "sms-voice:DescribeOptedOutNumbers"
                    - "sms-voice:DescribePools"
                    - "sms-voice:DescribePhoneNumbers"
                    - "sms-voice:DescribeProtectConfigurations"
                    - "sms-voice:DescribeRegistrations"
                    - "sms-voice:DescribeRegistrationAttachments"
                    - "sms-voice:DescribeRegistrationFieldDefinitions"
                    - "sms-voice:DescribeRegistrationFieldValues"
                    - "sms-voice:DescribeRegistrationSectionDefinitions"
                    - "sms-voice:DescribeRegistrationVersions"
                  Resource: "*"
                - !Ref "AWS::NoValue"

              # SMS - Send Access (conditional)
              - !If
                - EnableSMSSend
                - Sid: "SMSSendAccess"
                  Effect: Allow
                  Action:
                    - "sms-voice:SendTextMessage"
                    - "sms-voice:SendMediaMessage"
                  Resource: "*"
                - !Ref "AWS::NoValue"

              # DynamoDB - Read SMS Events (conditional, if using Wraps SMS tracking)
              - !If
                - EnableSMS
                - Sid: "DynamoDBReadSMSEvents"
                  Effect: Allow
                  Action:
                    - "dynamodb:DescribeTable"
                    - "dynamodb:Query"
                    - "dynamodb:Scan"
                    - "dynamodb:GetItem"
                    - "dynamodb:BatchGetItem"
                  Resource:
                    - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-sms-*"
                    - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-sms-*/index/*"
                - !Ref "AWS::NoValue"

              # SNS - Read SMS Event Topics (conditional)
              - !If
                - EnableSMS
                - Sid: "SNSReadSMSTopics"
                  Effect: Allow
                  Action:
                    - "sns:GetTopicAttributes"
                    - "sns:ListSubscriptionsByTopic"
                  Resource:
                    - !Sub "arn:aws:sns:*:${AWS::AccountId}:wraps-sms-*"
                - !Ref "AWS::NoValue"

              # Mail Manager - Archive Access (conditional, if using Wraps email archiving)
              - !If
                - EnableArchiving
                - Sid: "MailManagerArchiveAccess"
                  Effect: Allow
                  Action:
                    - "ses:StartArchiveSearch"
                    - "ses:GetArchiveSearchResults"
                    - "ses:GetArchiveMessage"
                    - "ses:GetArchiveMessageContent"
                    - "ses:GetArchive"
                    - "ses:ListArchives"
                    - "ses:StartArchiveExport"
                    - "ses:GetArchiveExport"
                  Resource: !Sub "arn:aws:ses:*:${AWS::AccountId}:mailmanager-archive/*"
                - !Ref "AWS::NoValue"
      Tags:
        - Key: ManagedBy
          Value: Wraps
        - Key: Purpose
          Value: "Console Access"

Outputs:
  RoleArn:
    Description: "ARN of the Wraps Console Access Role"
    Value: !GetAtt WrapsConsoleAccessRole.Arn
    Export:
      Name: "WrapsConsoleAccessRoleArn"

  ExternalId:
    Description: "External ID for this role (keep this secret)"
    Value: !Ref ExternalId

  AccountId:
    Description: "Your AWS Account ID"
    Value: !Ref AWS::AccountId

  Region:
    Description: "AWS Region where this stack is deployed"
    Value: !Ref AWS::Region

  Instructions:
    Description: "Next Steps"
    Value: "Copy the RoleArn and return to the Wraps dashboard to complete setup"
