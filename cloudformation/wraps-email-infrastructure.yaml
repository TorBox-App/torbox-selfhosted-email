AWSTemplateFormatVersion: "2010-09-09"
Description: "Wraps Email Infrastructure - Fully configurable email infrastructure with event tracking, history storage, alerting, and advanced features"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Vercel OIDC Configuration (Optional)"
        Parameters:
          - VercelTeamSlug
          - VercelProjectName
      - Label:
          default: "Domain Configuration (Optional)"
        Parameters:
          - Domain
          - MailFromSubdomain
      - Label:
          default: "Event Tracking"
        Parameters:
          - EnableEventTracking
          - EventTypes
      - Label:
          default: "History Storage"
        Parameters:
          - EnableHistoryStorage
          - HistoryRetentionDays
      - Label:
          default: "Alerting"
        Parameters:
          - EnableAlerting
          - AlertNotificationEmail
      - Label:
          default: "Email Archiving"
        Parameters:
          - EnableEmailArchiving
          - ArchiveRetention
      - Label:
          default: "Advanced Features"
        Parameters:
          - EnableSMTP
          - TLSRequired
          - ReputationMetrics
      - Label:
          default: "Wraps Platform Integration (Optional)"
        Parameters:
          - WrapsOrganizationId
          - WrapsWebhookSecret

  WrapsCliParity:
    Version: "2.0.0"
    Description: "This template matches the Wraps CLI Pulumi infrastructure"
    CLIOnlyFeatures:
      - Feature: "HTTPS Custom Tracking"
        Reason: "ACM + CloudFront + WAF require us-east-1 cross-region resources"
      - Feature: "Inbound Email"
        Reason: "Lambda requires mailparser npm dependency (cannot inline in ZipFile)"
      - Feature: "Archive to Config Set Linking"
        Reason: "Requires SDK call (PutConfigurationSetArchivingOptions) not supported in CloudFormation"

Parameters:
  # Optional - Vercel OIDC (leave empty if not using Vercel)
  VercelTeamSlug:
    Type: String
    Description: "Your Vercel team slug (e.g., 'my-team') - leave empty if not using Vercel"
    Default: ""

  VercelProjectName:
    Type: String
    Description: "Your Vercel project name (e.g., 'my-app') - leave empty if not using Vercel"
    Default: ""

  # Optional - Domain
  Domain:
    Type: String
    Description: "Primary sending domain (leave empty to skip domain setup)"
    Default: ""

  MailFromSubdomain:
    Type: String
    Description: "MAIL FROM subdomain for improved deliverability"
    Default: "mail"

  # Event Tracking
  EnableEventTracking:
    Type: String
    Description: "Enable EventBridge event tracking for SES events"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  EventTypes:
    Type: CommaDelimitedList
    Description: "SES event types to track (comma-separated)"
    Default: "SEND,DELIVERY,BOUNCE,COMPLAINT,OPEN,CLICK,REJECT,RENDERING_FAILURE,DELIVERY_DELAY,SUBSCRIPTION"

  # History Storage
  EnableHistoryStorage:
    Type: String
    Description: "Store events in DynamoDB for history queries and analytics"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  HistoryRetentionDays:
    Type: Number
    Description: "Days to retain event history in DynamoDB"
    Default: 90
    MinValue: 1
    MaxValue: 3650

  # Alerting
  EnableAlerting:
    Type: String
    Description: "Enable SNS alerts and CloudWatch alarms for email reputation monitoring"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  AlertNotificationEmail:
    Type: String
    Description: "Email address for alert notifications (leave empty to skip email subscription)"
    Default: ""

  # Email Archiving
  EnableEmailArchiving:
    Type: String
    Description: "Enable Mail Manager Archive for email archiving"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  ArchiveRetention:
    Type: String
    Description: "Retention period for email archive"
    Default: "THREE_MONTHS"
    AllowedValues:
      - "THREE_MONTHS"
      - "SIX_MONTHS"
      - "NINE_MONTHS"
      - "ONE_YEAR"
      - "EIGHTEEN_MONTHS"
      - "TWO_YEARS"
      - "THIRTY_MONTHS"
      - "THREE_YEARS"
      - "FOUR_YEARS"
      - "FIVE_YEARS"
      - "SIX_YEARS"
      - "SEVEN_YEARS"
      - "EIGHT_YEARS"
      - "NINE_YEARS"
      - "TEN_YEARS"
      - "PERMANENT"

  # Advanced Features
  EnableSMTP:
    Type: String
    Description: "Create SMTP credentials for legacy systems"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  TLSRequired:
    Type: String
    Description: "Require TLS encryption for all outbound emails"
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  ReputationMetrics:
    Type: String
    Description: "Enable SES reputation metrics dashboard"
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

  # Wraps Platform Integration
  WrapsOrganizationId:
    Type: String
    Description: "Your Wraps Organization ID (for dashboard integration)"
    Default: ""

  WrapsWebhookSecret:
    Type: String
    Description: "Webhook secret for Wraps platform integration"
    Default: ""
    NoEcho: true

  # Optional Route53 Integration
  Route53HostedZoneId:
    Type: String
    Description: "(Optional) Route53 Hosted Zone ID - if provided, DKIM records will be created automatically"
    Default: ""

Conditions:
  HasVercelOIDC: !And
    - !Not [!Equals [!Ref VercelTeamSlug, ""]]
    - !Not [!Equals [!Ref VercelProjectName, ""]]
  NoVercelOIDC: !Or
    - !Equals [!Ref VercelTeamSlug, ""]
    - !Equals [!Ref VercelProjectName, ""]
  HasDomain: !Not [!Equals [!Ref Domain, ""]]
  HasEventTracking: !Equals [!Ref EnableEventTracking, "true"]
  HasHistoryStorage: !And
    - !Equals [!Ref EnableHistoryStorage, "true"]
    - !Condition HasEventTracking
  HasSMTP: !Equals [!Ref EnableSMTP, "true"]
  HasTLS: !Equals [!Ref TLSRequired, "true"]
  HasReputationMetrics: !Equals [!Ref ReputationMetrics, "true"]
  HasWebhook: !Not [!Equals [!Ref WrapsWebhookSecret, ""]]
  HasRoute53: !And
    - !Condition HasDomain
    - !Not [!Equals [!Ref Route53HostedZoneId, ""]]
  HasAlerting: !Equals [!Ref EnableAlerting, "true"]
  HasAlertEmail: !And
    - !Condition HasAlerting
    - !Not [!Equals [!Ref AlertNotificationEmail, ""]]
  HasAlertingAndEventTracking: !And
    - !Condition HasAlerting
    - !Condition HasEventTracking
  HasEmailArchiving: !Equals [!Ref EnableEmailArchiving, "true"]

Resources:
  # ===========================================
  # OIDC Provider for Vercel (Conditional)
  # ===========================================
  VercelOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: HasVercelOIDC
    Properties:
      Url: !Sub "https://oidc.vercel.com/${VercelTeamSlug}"
      ClientIdList:
        - !Sub "https://vercel.com/${VercelTeamSlug}"
      ThumbprintList:
        - "20032e77eca0785eece16b56b42c9b330b906320"
        - "696db3af0dffc17e65c6a20d925c5a7bd24dec7e"
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  # ===========================================
  # IAM Role for SDK Authentication (Vercel OIDC)
  # ===========================================
  WrapsEmailRoleVercel:
    Type: AWS::IAM::Role
    Condition: HasVercelOIDC
    Properties:
      RoleName: "wraps-email-role"
      Description: "IAM role for Wraps SDK to send emails via SES (Vercel OIDC)"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {
                  "Federated": "${OIDCProviderArn}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "oidc.vercel.com/${TeamSlug}:aud": "https://vercel.com/${TeamSlug}"
                  },
                  "StringLike": {
                    "oidc.vercel.com/${TeamSlug}:sub": "owner:${TeamSlug}:project:${ProjectName}:environment:*"
                  }
                }
              }]
            }
          - OIDCProviderArn: !GetAtt VercelOIDCProvider.Arn
            TeamSlug: !Ref VercelTeamSlug
            ProjectName: !Ref VercelProjectName
      Policies:
        - PolicyName: "wraps-email-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # SES Sending Permissions
              - Sid: "SESSending"
                Effect: Allow
                Action:
                  - "ses:SendEmail"
                  - "ses:SendRawEmail"
                  - "ses:SendTemplatedEmail"
                  - "ses:SendBulkTemplatedEmail"
                  - "ses:SendBulkEmail"
                Resource: "*"

              # SES Read Permissions
              - Sid: "SESRead"
                Effect: Allow
                Action:
                  - "ses:GetSendQuota"
                  - "ses:GetSendStatistics"
                  - "ses:GetAccount"
                  - "ses:ListIdentities"
                  - "ses:GetIdentityVerificationAttributes"
                  - "ses:ListEmailIdentities"
                  - "ses:GetEmailIdentity"
                  - "ses:GetConfigurationSet"
                  - "ses:GetConfigurationSetEventDestinations"
                Resource: "*"

              # CloudWatch Metrics
              - Sid: "CloudWatchMetrics"
                Effect: Allow
                Action:
                  - "cloudwatch:GetMetricData"
                  - "cloudwatch:GetMetricStatistics"
                  - "cloudwatch:ListMetrics"
                Resource: "*"

              # DynamoDB - History Table (conditional)
              - !If
                - HasHistoryStorage
                - Sid: "DynamoDBAccess"
                  Effect: Allow
                  Action:
                    - "dynamodb:PutItem"
                    - "dynamodb:GetItem"
                    - "dynamodb:Query"
                    - "dynamodb:Scan"
                    - "dynamodb:BatchGetItem"
                    - "dynamodb:DescribeTable"
                  Resource:
                    - !GetAtt WrapsEmailHistoryTable.Arn
                    - !Sub "${WrapsEmailHistoryTable.Arn}/index/*"
                - !Ref AWS::NoValue

              # EventBridge Access (conditional)
              - !If
                - HasEventTracking
                - Sid: "EventBridgeAccess"
                  Effect: Allow
                  Action:
                    - "events:PutEvents"
                    - "events:DescribeEventBus"
                  Resource: !Sub "arn:aws:events:*:${AWS::AccountId}:event-bus/wraps-email-*"
                - !Ref AWS::NoValue

              # SQS Access (conditional)
              - !If
                - HasEventTracking
                - Sid: "SQSAccess"
                  Effect: Allow
                  Action:
                    - "sqs:SendMessage"
                    - "sqs:ReceiveMessage"
                    - "sqs:DeleteMessage"
                    - "sqs:GetQueueAttributes"
                  Resource: !Sub "arn:aws:sqs:*:${AWS::AccountId}:wraps-email-*"
                - !Ref AWS::NoValue

              # Email Archiving (conditional)
              - !If
                - HasEmailArchiving
                - Sid: "EmailArchiving"
                  Effect: Allow
                  Action:
                    - "ses:StartArchiveSearch"
                    - "ses:GetArchiveSearchResults"
                    - "ses:GetArchiveMessage"
                    - "ses:GetArchiveMessageContent"
                    - "ses:GetArchive"
                    - "ses:ListArchives"
                    - "ses:StartArchiveExport"
                    - "ses:GetArchiveExport"
                  Resource: !Sub "arn:aws:ses:*:${AWS::AccountId}:mailmanager-archive/*"
                - !Ref AWS::NoValue
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  # ===========================================
  # IAM Role for SDK Authentication (Non-Vercel)
  # ===========================================
  WrapsEmailRoleStandard:
    Type: AWS::IAM::Role
    Condition: NoVercelOIDC
    Properties:
      RoleName: "wraps-email-role"
      Description: "IAM role for Wraps SDK to send emails via SES"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "lambda.amazonaws.com"
                - "ec2.amazonaws.com"
                - "ecs-tasks.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: "wraps-email-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # SES Sending Permissions
              - Sid: "SESSending"
                Effect: Allow
                Action:
                  - "ses:SendEmail"
                  - "ses:SendRawEmail"
                  - "ses:SendTemplatedEmail"
                  - "ses:SendBulkTemplatedEmail"
                  - "ses:SendBulkEmail"
                Resource: "*"

              # SES Read Permissions
              - Sid: "SESRead"
                Effect: Allow
                Action:
                  - "ses:GetSendQuota"
                  - "ses:GetSendStatistics"
                  - "ses:GetAccount"
                  - "ses:ListIdentities"
                  - "ses:GetIdentityVerificationAttributes"
                  - "ses:ListEmailIdentities"
                  - "ses:GetEmailIdentity"
                  - "ses:GetConfigurationSet"
                  - "ses:GetConfigurationSetEventDestinations"
                Resource: "*"

              # CloudWatch Metrics
              - Sid: "CloudWatchMetrics"
                Effect: Allow
                Action:
                  - "cloudwatch:GetMetricData"
                  - "cloudwatch:GetMetricStatistics"
                  - "cloudwatch:ListMetrics"
                Resource: "*"

              # DynamoDB - History Table (conditional)
              - !If
                - HasHistoryStorage
                - Sid: "DynamoDBAccess"
                  Effect: Allow
                  Action:
                    - "dynamodb:PutItem"
                    - "dynamodb:GetItem"
                    - "dynamodb:Query"
                    - "dynamodb:Scan"
                    - "dynamodb:BatchGetItem"
                    - "dynamodb:DescribeTable"
                  Resource:
                    - !GetAtt WrapsEmailHistoryTable.Arn
                    - !Sub "${WrapsEmailHistoryTable.Arn}/index/*"
                - !Ref AWS::NoValue

              # EventBridge Access (conditional)
              - !If
                - HasEventTracking
                - Sid: "EventBridgeAccess"
                  Effect: Allow
                  Action:
                    - "events:PutEvents"
                    - "events:DescribeEventBus"
                  Resource: !Sub "arn:aws:events:*:${AWS::AccountId}:event-bus/wraps-email-*"
                - !Ref AWS::NoValue

              # SQS Access (conditional)
              - !If
                - HasEventTracking
                - Sid: "SQSAccess"
                  Effect: Allow
                  Action:
                    - "sqs:SendMessage"
                    - "sqs:ReceiveMessage"
                    - "sqs:DeleteMessage"
                    - "sqs:GetQueueAttributes"
                  Resource: !Sub "arn:aws:sqs:*:${AWS::AccountId}:wraps-email-*"
                - !Ref AWS::NoValue

              # Email Archiving (conditional)
              - !If
                - HasEmailArchiving
                - Sid: "EmailArchiving"
                  Effect: Allow
                  Action:
                    - "ses:StartArchiveSearch"
                    - "ses:GetArchiveSearchResults"
                    - "ses:GetArchiveMessage"
                    - "ses:GetArchiveMessageContent"
                    - "ses:GetArchive"
                    - "ses:ListArchives"
                    - "ses:StartArchiveExport"
                    - "ses:GetArchiveExport"
                  Resource: !Sub "arn:aws:ses:*:${AWS::AccountId}:mailmanager-archive/*"
                - !Ref AWS::NoValue
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  # ===========================================
  # SES Configuration Set
  # ===========================================
  WrapsEmailConfigSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: "wraps-email-tracking"
      SuppressionOptions:
        SuppressedReasons:
          - BOUNCE
          - COMPLAINT
      DeliveryOptions: !If
        - HasTLS
        - TlsPolicy: REQUIRE
        - !Ref AWS::NoValue
      ReputationOptions: !If
        - HasReputationMetrics
        - ReputationMetricsEnabled: true
        - !Ref AWS::NoValue
      SendingOptions:
        SendingEnabled: true

  # ===========================================
  # SES Domain Identity (Conditional)
  # ===========================================
  WrapsEmailDomainIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: HasDomain
    Properties:
      EmailIdentity: !Ref Domain
      ConfigurationSetAttributes:
        ConfigurationSetName: !Ref WrapsEmailConfigSet
      DkimSigningAttributes:
        NextSigningKeyLength: RSA_2048_BIT
      MailFromAttributes:
        MailFromDomain: !Sub "${MailFromSubdomain}.${Domain}"
        BehaviorOnMxFailure: USE_DEFAULT_VALUE

  # ===========================================
  # Route53 DKIM Records (Conditional - if Route53 Hosted Zone provided)
  # ===========================================
  DkimRecord1:
    Type: AWS::Route53::RecordSet
    Condition: HasRoute53
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !GetAtt WrapsEmailDomainIdentity.DkimDNSTokenName1
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !GetAtt WrapsEmailDomainIdentity.DkimDNSTokenValue1

  DkimRecord2:
    Type: AWS::Route53::RecordSet
    Condition: HasRoute53
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !GetAtt WrapsEmailDomainIdentity.DkimDNSTokenName2
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !GetAtt WrapsEmailDomainIdentity.DkimDNSTokenValue2

  DkimRecord3:
    Type: AWS::Route53::RecordSet
    Condition: HasRoute53
    Properties:
      HostedZoneId: !Ref Route53HostedZoneId
      Name: !GetAtt WrapsEmailDomainIdentity.DkimDNSTokenName3
      Type: CNAME
      TTL: "300"
      ResourceRecords:
        - !GetAtt WrapsEmailDomainIdentity.DkimDNSTokenValue3

  # ===========================================
  # EventBridge Event Destination (Conditional)
  # ===========================================
  WrapsEmailEventDestination:
    Type: AWS::SES::ConfigurationSetEventDestination
    Condition: HasEventTracking
    DependsOn: WrapsEmailConfigSet
    Properties:
      ConfigurationSetName: "wraps-email-tracking"
      EventDestination:
        Name: "wraps-email-eventbridge"
        Enabled: true
        MatchingEventTypes: !Ref EventTypes
        EventBridgeDestination:
          EventBusArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"

  # ===========================================
  # SQS Queues (Conditional - for event tracking)
  # ===========================================
  WrapsEmailDLQ:
    Type: AWS::SQS::Queue
    Condition: HasEventTracking
    Properties:
      QueueName: "wraps-email-events-dlq"
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  WrapsEmailQueue:
    Type: AWS::SQS::Queue
    Condition: HasEventTracking
    Properties:
      QueueName: "wraps-email-events"
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WrapsEmailDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  WrapsEmailQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Condition: HasEventTracking
    Properties:
      Queues:
        - !Ref WrapsEmailQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowEventBridgeToSendMessage"
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "sqs:SendMessage"
            Resource: !GetAtt WrapsEmailQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !GetAtt WrapsEmailEventRule.Arn

  # ===========================================
  # EventBridge Rule (Conditional - for event tracking)
  # ===========================================
  WrapsEmailEventRule:
    Type: AWS::Events::Rule
    Condition: HasEventTracking
    Properties:
      Name: "wraps-email-events-to-sqs"
      Description: "Route SES email events to SQS for processing"
      EventPattern:
        source:
          - "aws.ses"
      State: ENABLED
      Targets:
        - Id: "SQSTarget"
          Arn: !GetAtt WrapsEmailQueue.Arn

  # ===========================================
  # DynamoDB History Table (Conditional)
  # ===========================================
  WrapsEmailHistoryTable:
    Type: AWS::DynamoDB::Table
    Condition: HasHistoryStorage
    Properties:
      TableName: "wraps-email-history"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: messageId
          AttributeType: S
        - AttributeName: sentAt
          AttributeType: "N"
        - AttributeName: accountId
          AttributeType: S
      KeySchema:
        - AttributeName: messageId
          KeyType: HASH
        - AttributeName: sentAt
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: accountId-sentAt-index
          KeySchema:
            - AttributeName: accountId
              KeyType: HASH
            - AttributeName: sentAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  # ===========================================
  # Lambda Event Processor (Conditional)
  # ===========================================
  WrapsEmailProcessorRole:
    Type: AWS::IAM::Role
    Condition: HasHistoryStorage
    Properties:
      RoleName: "wraps-email-processor-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: "wraps-email-processor-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: "SQSAccess"
                Effect: Allow
                Action:
                  - "sqs:ReceiveMessage"
                  - "sqs:DeleteMessage"
                  - "sqs:GetQueueAttributes"
                Resource: !GetAtt WrapsEmailQueue.Arn
              - Sid: "DynamoDBAccess"
                Effect: Allow
                Action:
                  - "dynamodb:PutItem"
                  - "dynamodb:GetItem"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                  - "dynamodb:UpdateItem"
                Resource:
                  - !GetAtt WrapsEmailHistoryTable.Arn
                  - !Sub "${WrapsEmailHistoryTable.Arn}/index/*"
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  WrapsEmailProcessor:
    Type: AWS::Lambda::Function
    Condition: HasHistoryStorage
    Properties:
      FunctionName: "wraps-email-event-processor"
      Description: "Processes SES email events and stores them in DynamoDB"
      Runtime: nodejs24.x
      Handler: index.handler
      Timeout: 300
      MemorySize: 512
      Role: !GetAtt WrapsEmailProcessorRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref WrapsEmailHistoryTable
          RETENTION_DAYS: !Ref HistoryRetentionDays
          AWS_ACCOUNT_ID: !Ref AWS::AccountId
      Code:
        ZipFile: |
          const { DynamoDBClient, PutItemCommand } = require('@aws-sdk/client-dynamodb');
          const dynamodb = new DynamoDBClient({});
          const TABLE_NAME = process.env.TABLE_NAME;
          const RETENTION_DAYS = parseInt(process.env.RETENTION_DAYS || '90', 10);
          const ACCOUNT_ID = process.env.AWS_ACCOUNT_ID || 'unknown';

          exports.handler = async (event) => {
            for (const record of event.Records) {
              try {
                const eventBridgeEvent = JSON.parse(record.body);
                const message = eventBridgeEvent.detail;
                let eventType = message.eventType || message.notificationType;
                const mail = message.mail;
                const messageId = mail.messageId;
                const mailTimestamp = new Date(mail.timestamp).getTime();
                const from = mail.source;
                const to = mail.destination || [];
                const subject = mail.commonHeaders && mail.commonHeaders.subject ? mail.commonHeaders.subject : '';

                let additionalData = {};
                let eventTimestamp = mailTimestamp;

                if (eventType === 'Send' && message.send) {
                  additionalData = { tags: mail.tags || {} };
                } else if (eventType === 'Delivery' && message.delivery) {
                  eventTimestamp = new Date(message.delivery.timestamp).getTime();
                  additionalData = {
                    timestamp: message.delivery.timestamp,
                    processingTimeMillis: message.delivery.processingTimeMillis,
                    recipients: message.delivery.recipients,
                    smtpResponse: message.delivery.smtpResponse,
                    remoteMtaIp: message.delivery.remoteMtaIp,
                  };
                } else if (eventType === 'Open' && message.open) {
                  eventTimestamp = new Date(message.open.timestamp).getTime();
                  additionalData = {
                    timestamp: message.open.timestamp,
                    userAgent: message.open.userAgent,
                    ipAddress: message.open.ipAddress,
                  };
                } else if (eventType === 'Click' && message.click) {
                  eventTimestamp = new Date(message.click.timestamp).getTime();
                  additionalData = {
                    timestamp: message.click.timestamp,
                    link: message.click.link,
                    linkTags: message.click.linkTags || {},
                    userAgent: message.click.userAgent,
                    ipAddress: message.click.ipAddress,
                  };
                } else if (eventType === 'Bounce' && message.bounce) {
                  const bounceSubType = message.bounce.bounceSubType;
                  if (bounceSubType === 'Suppressed' || bounceSubType === 'OnAccountSuppressionList') {
                    eventType = 'Suppressed';
                    eventTimestamp = new Date(message.bounce.timestamp).getTime();
                    additionalData = {
                      reason: bounceSubType,
                      suppressedRecipients: message.bounce.bouncedRecipients,
                      timestamp: message.bounce.timestamp,
                      feedbackId: message.bounce.feedbackId,
                    };
                  } else {
                    eventTimestamp = new Date(message.bounce.timestamp).getTime();
                    additionalData = {
                      bounceType: message.bounce.bounceType,
                      bounceSubType: message.bounce.bounceSubType,
                      bouncedRecipients: message.bounce.bouncedRecipients,
                      timestamp: message.bounce.timestamp,
                      feedbackId: message.bounce.feedbackId,
                    };
                  }
                } else if (eventType === 'Complaint' && message.complaint) {
                  eventTimestamp = new Date(message.complaint.timestamp).getTime();
                  additionalData = {
                    complainedRecipients: message.complaint.complainedRecipients,
                    timestamp: message.complaint.timestamp,
                    feedbackId: message.complaint.feedbackId,
                    complaintFeedbackType: message.complaint.complaintFeedbackType,
                    userAgent: message.complaint.userAgent,
                  };
                } else if (eventType === 'Reject' && message.reject) {
                  additionalData = { reason: message.reject.reason };
                } else if (eventType === 'Rendering Failure' && message.failure) {
                  additionalData = {
                    errorMessage: message.failure.errorMessage,
                    templateName: message.failure.templateName,
                  };
                } else if (eventType === 'DeliveryDelay' && message.deliveryDelay) {
                  eventTimestamp = new Date(message.deliveryDelay.timestamp).getTime();
                  additionalData = {
                    timestamp: message.deliveryDelay.timestamp,
                    delayType: message.deliveryDelay.delayType,
                    expirationTime: message.deliveryDelay.expirationTime,
                    delayedRecipients: message.deliveryDelay.delayedRecipients,
                  };
                } else if (eventType === 'Subscription' && message.subscription) {
                  eventTimestamp = new Date(message.subscription.timestamp).getTime();
                  additionalData = {
                    contactList: message.subscription.contactList,
                    timestamp: message.subscription.timestamp,
                    source: message.subscription.source,
                    newTopicPreferences: message.subscription.newTopicPreferences,
                    oldTopicPreferences: message.subscription.oldTopicPreferences,
                  };
                }

                const expiresAt = RETENTION_DAYS > 0
                  ? Date.now() + RETENTION_DAYS * 86400000
                  : Date.now() + 365 * 86400000;

                await dynamodb.send(new PutItemCommand({
                  TableName: TABLE_NAME,
                  Item: {
                    messageId: { S: messageId },
                    sentAt: { N: eventTimestamp.toString() },
                    accountId: { S: ACCOUNT_ID },
                    from: { S: from },
                    to: { L: to.map(function(e) { return { S: e }; }) },
                    subject: { S: subject },
                    eventType: { S: eventType },
                    eventData: { S: JSON.stringify(message) },
                    additionalData: { S: JSON.stringify(additionalData) },
                    createdAt: { N: Date.now().toString() },
                    expiresAt: { N: expiresAt.toString() },
                  },
                }));
              } catch (error) {
                console.error('Error processing record:', error);
              }
            }
            return { statusCode: 200, body: JSON.stringify({ message: 'Events processed' }) };
          };
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  WrapsEmailProcessorEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Condition: HasHistoryStorage
    Properties:
      EventSourceArn: !GetAtt WrapsEmailQueue.Arn
      FunctionName: !Ref WrapsEmailProcessor
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures
      Enabled: true

  # ===========================================
  # SMTP User (Conditional)
  # ===========================================
  WrapsEmailSMTPUser:
    Type: AWS::IAM::User
    Condition: HasSMTP
    Properties:
      UserName: "wraps-email-smtp-user"
      Policies:
        - PolicyName: "wraps-smtp-send-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: "SESSMTPSending"
                Effect: Allow
                Action:
                  - "ses:SendRawEmail"
                Resource: "*"
                Condition:
                  StringEquals:
                    "ses:ConfigurationSetName": "wraps-email-tracking"
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  WrapsEmailSMTPAccessKey:
    Type: AWS::IAM::AccessKey
    Condition: HasSMTP
    Properties:
      UserName: !Ref WrapsEmailSMTPUser
      Status: Active

  # ===========================================
  # Alerting Resources (Conditional)
  # ===========================================
  WrapsEmailAlertsTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlerting
    Properties:
      TopicName: "wraps-email-alerts"
      DisplayName: "Wraps Email Alerts"
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation
        - Key: Description
          Value: "Alert notifications for email reputation and health"

  WrapsEmailAlertsEmailSub:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref WrapsEmailAlertsTopic
      Protocol: email
      Endpoint: !Ref AlertNotificationEmail

  WrapsBounceRateWarning:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlerting
    Properties:
      AlarmName: "wraps-email-bounce-rate-warning"
      AlarmDescription: "Bounce rate exceeded 2% - investigate before AWS takes action (warns at 5%, suspends at 10%)"
      Namespace: "AWS/SES"
      MetricName: "Reputation.BounceRate"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 0.02
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WrapsEmailAlertsTopic
      OKActions:
        - !Ref WrapsEmailAlertsTopic

  WrapsBounceRateCritical:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlerting
    Properties:
      AlarmName: "wraps-email-bounce-rate-critical"
      AlarmDescription: "CRITICAL: Bounce rate exceeded 4% - approaching AWS warning threshold (5%). Immediate action required!"
      Namespace: "AWS/SES"
      MetricName: "Reputation.BounceRate"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0.04
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WrapsEmailAlertsTopic
      OKActions:
        - !Ref WrapsEmailAlertsTopic

  WrapsComplaintRateWarning:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlerting
    Properties:
      AlarmName: "wraps-email-complaint-rate-warning"
      AlarmDescription: "Complaint rate exceeded 0.05% - investigate before AWS (0.1%) or Gmail (0.3%) take action"
      Namespace: "AWS/SES"
      MetricName: "Reputation.ComplaintRate"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 0.0005
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WrapsEmailAlertsTopic
      OKActions:
        - !Ref WrapsEmailAlertsTopic

  WrapsComplaintRateCritical:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlerting
    Properties:
      AlarmName: "wraps-email-complaint-rate-critical"
      AlarmDescription: "CRITICAL: Complaint rate exceeded 0.08% - approaching AWS warning (0.1%). Immediate action required!"
      Namespace: "AWS/SES"
      MetricName: "Reputation.ComplaintRate"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0.0008
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref WrapsEmailAlertsTopic
      OKActions:
        - !Ref WrapsEmailAlertsTopic

  WrapsDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertingAndEventTracking
    Properties:
      AlarmName: "wraps-email-dlq-messages"
      AlarmDescription: "Messages in dead letter queue - event processing is failing. Check Lambda logs for errors."
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: "wraps-email-events-dlq"
      AlarmActions:
        - !Ref WrapsEmailAlertsTopic
      OKActions:
        - !Ref WrapsEmailAlertsTopic

  # ===========================================
  # Email Archiving (Conditional)
  # ===========================================
  WrapsEmailArchive:
    Type: AWS::SES::MailManagerArchive
    Condition: HasEmailArchiving
    Properties:
      ArchiveName: "wraps-email-archive"
      Retention:
        RetentionPeriod: !Ref ArchiveRetention
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  # ===========================================
  # Wraps Platform Webhook Integration (Conditional)
  # Uses API Destination to send events directly to api.wraps.dev
  # ===========================================

  # 1. Connection - stores API key credentials in Secrets Manager
  WrapsWebhookConnection:
    Type: AWS::Events::Connection
    Condition: HasWebhook
    Properties:
      Name: "wraps-webhook-connection"
      Description: "Connection for Wraps platform webhook"
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "X-Wraps-Api-Key"
          ApiKeyValue: !Ref WrapsWebhookSecret

  # 2. API Destination - HTTP endpoint to call
  WrapsWebhookApiDestination:
    Type: AWS::Events::ApiDestination
    Condition: HasWebhook
    Properties:
      Name: "wraps-webhook-destination"
      Description: "Send SES events to Wraps platform"
      ConnectionArn: !GetAtt WrapsWebhookConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub "https://api.wraps.dev/webhooks/ses/${AWS::AccountId}"
      InvocationRateLimitPerSecond: 300

  # 3. IAM Role for EventBridge to invoke API Destination
  WrapsWebhookRole:
    Type: AWS::IAM::Role
    Condition: HasWebhook
    Properties:
      RoleName: "wraps-email-webhook-role"
      Description: "Role for EventBridge to invoke Wraps webhook API Destination"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: "wraps-webhook-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: "InvokeApiDestination"
                Effect: Allow
                Action:
                  - "events:InvokeApiDestination"
                Resource: !GetAtt WrapsWebhookApiDestination.Arn
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation

  # 4. EventBridge Rule - forwards SES events to API Destination
  WrapsWebhookEventRule:
    Type: AWS::Events::Rule
    Condition: HasWebhook
    Properties:
      Name: "wraps-email-events-to-webhook"
      Description: "Forward SES email events to Wraps platform for dashboard analytics"
      EventPattern:
        source:
          - "aws.ses"
      State: ENABLED
      Targets:
        - Id: "WrapsWebhookTarget"
          Arn: !GetAtt WrapsWebhookApiDestination.Arn
          RoleArn: !GetAtt WrapsWebhookRole.Arn

  # ===========================================
  # Console Access Role (for Wraps Dashboard)
  # ===========================================
  WrapsConsoleAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "wraps-console-access-role"
      Description: "Allows Wraps dashboard to read CloudWatch metrics and email data"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - "arn:aws:iam::905130073023:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Sub "${AWS::StackId}"
      Policies:
        - PolicyName: "wraps-console-access-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Metrics - Read Only
              - Sid: "CloudWatchMetricsReadOnly"
                Effect: Allow
                Action:
                  - "cloudwatch:GetMetricData"
                  - "cloudwatch:GetMetricStatistics"
                  - "cloudwatch:ListMetrics"
                Resource: "*"

              # SES - Read Access
              - Sid: "SESReadAccess"
                Effect: Allow
                Action:
                  - "ses:GetSendQuota"
                  - "ses:GetSendStatistics"
                  - "ses:GetAccount"
                  - "ses:ListIdentities"
                  - "ses:GetIdentityVerificationAttributes"
                  - "ses:GetIdentityDkimAttributes"
                  - "ses:ListEmailIdentities"
                  - "ses:GetEmailIdentity"
                  - "ses:GetConfigurationSet"
                  - "ses:GetConfigurationSetEventDestinations"
                Resource: "*"

              # SES - Template Management
              - Sid: "SESTemplateManagement"
                Effect: Allow
                Action:
                  - "ses:GetTemplate"
                  - "ses:ListTemplates"
                  - "ses:CreateTemplate"
                  - "ses:UpdateTemplate"
                  - "ses:DeleteTemplate"
                  - "ses:TestRenderTemplate"
                Resource: "*"

              # SES - Send Access (for batch sending and test sends via dashboard)
              - Sid: "SESSendAccess"
                Effect: Allow
                Action:
                  - "ses:SendEmail"
                  - "ses:SendRawEmail"
                  - "ses:SendTemplatedEmail"
                  - "ses:SendBulkTemplatedEmail"
                  - "ses:SendBulkEmail"
                Resource: "*"

              # DynamoDB - Read Email Events
              - Sid: "DynamoDBReadEmailEvents"
                Effect: Allow
                Action:
                  - "dynamodb:DescribeTable"
                  - "dynamodb:Query"
                  - "dynamodb:Scan"
                  - "dynamodb:GetItem"
                  - "dynamodb:BatchGetItem"
                Resource:
                  - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-email-*"
                  - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/wraps-email-*/index/*"

              # CloudFormation - Read stack outputs (for feature detection)
              - Sid: "CloudFormationReadOutputs"
                Effect: Allow
                Action:
                  - "cloudformation:DescribeStacks"
                  - "cloudformation:ListStacks"
                Resource: "*"
      Tags:
        - Key: ManagedBy
          Value: wraps-cloudformation
        - Key: Purpose
          Value: "Console Access"

Outputs:
  # Core Outputs
  RoleArn:
    Description: "IAM role ARN for SDK authentication (set as WRAPS_AWS_ROLE_ARN)"
    Value: !If
      - HasVercelOIDC
      - !GetAtt WrapsEmailRoleVercel.Arn
      - !GetAtt WrapsEmailRoleStandard.Arn
    Export:
      Name: "WrapsEmailRoleArn"

  # Console Access Outputs (for Wraps Dashboard)
  ConsoleRoleArn:
    Description: "Paste this into the 'Console Role ARN' field in the Wraps dashboard"
    Value: !GetAtt WrapsConsoleAccessRole.Arn
    Export:
      Name: "WrapsConsoleAccessRoleArn"

  ExternalId:
    Description: "Paste this into the 'External ID' field in the Wraps dashboard (this is your CloudFormation stack ID — it will look like an ARN, that's expected)"
    Value: !Sub "${AWS::StackId}"

  ConfigSetName:
    Description: "SES configuration set name (set as WRAPS_CONFIG_SET)"
    Value: !Ref WrapsEmailConfigSet
    Export:
      Name: "WrapsEmailConfigSetName"

  Region:
    Description: "AWS region (set as WRAPS_AWS_REGION)"
    Value: !Ref AWS::Region
    Export:
      Name: "WrapsEmailRegion"

  AccountId:
    Description: "AWS Account ID"
    Value: !Ref AWS::AccountId

  # Domain Outputs (Conditional)
  Domain:
    Condition: HasDomain
    Description: "Primary sending domain"
    Value: !Ref Domain

  MailFromDomain:
    Condition: HasDomain
    Description: "MAIL FROM domain for SPF alignment"
    Value: !Sub "${MailFromSubdomain}.${Domain}"

  MailFromDNS:
    Condition: HasDomain
    Description: "DNS records needed for MAIL FROM domain"
    Value: !Sub |
      Configure these DNS records for your MAIL FROM domain (${MailFromSubdomain}.${Domain}):
      1. TXT record: v=spf1 include:amazonses.com ~all
      2. MX record: 10 feedback-smtp.${AWS::Region}.amazonses.com

  # Event Tracking Outputs (Conditional)
  TableName:
    Condition: HasHistoryStorage
    Description: "DynamoDB table name for email history"
    Value: !Ref WrapsEmailHistoryTable
    Export:
      Name: "WrapsEmailHistoryTableName"

  QueueUrl:
    Condition: HasEventTracking
    Description: "SQS queue URL for events"
    Value: !Ref WrapsEmailQueue
    Export:
      Name: "WrapsEmailQueueUrl"

  DLQUrl:
    Condition: HasEventTracking
    Description: "SQS dead letter queue URL"
    Value: !Ref WrapsEmailDLQ
    Export:
      Name: "WrapsEmailDLQUrl"

  LambdaArn:
    Condition: HasHistoryStorage
    Description: "Lambda function ARN for event processing"
    Value: !GetAtt WrapsEmailProcessor.Arn
    Export:
      Name: "WrapsEmailProcessorArn"

  # Alerting Outputs (Conditional)
  AlertTopicArn:
    Condition: HasAlerting
    Description: "SNS topic ARN for email alerts"
    Value: !Ref WrapsEmailAlertsTopic
    Export:
      Name: "WrapsEmailAlertTopicArn"

  # Archiving Outputs (Conditional)
  ArchiveArn:
    Condition: HasEmailArchiving
    Description: "Mail Manager Archive ARN (link to config set requires SDK call: PutConfigurationSetArchivingOptions)"
    Value: !GetAtt WrapsEmailArchive.ArchiveArn
    Export:
      Name: "WrapsEmailArchiveArn"

  # SMTP Outputs (Conditional)
  SMTPEndpoint:
    Condition: HasSMTP
    Description: "SMTP endpoint for email sending"
    Value: !Sub "email-smtp.${AWS::Region}.amazonaws.com"

  SMTPUsername:
    Condition: HasSMTP
    Description: "SMTP username (IAM Access Key ID)"
    Value: !Ref WrapsEmailSMTPAccessKey

  SMTPPassword:
    Condition: HasSMTP
    Description: "SMTP password (derived from secret key - STORE SECURELY)"
    Value: !GetAtt WrapsEmailSMTPAccessKey.SecretAccessKey

  # Features JSON Output
  Features:
    Description: "JSON representation of enabled features"
    Value: !Sub |
      {
        "domain": "${Domain}",
        "eventTracking": ${EnableEventTracking},
        "historyStorage": ${EnableHistoryStorage},
        "smtp": ${EnableSMTP},
        "tlsRequired": ${TLSRequired},
        "reputationMetrics": ${ReputationMetrics},
        "alerting": ${EnableAlerting},
        "emailArchiving": ${EnableEmailArchiving}
      }

  # Environment Variables (convenience output)
  EnvironmentVariables:
    Description: "Environment variables to set in your application (copy RoleArn from above)"
    Value: !Sub |
      WRAPS_AWS_ROLE_ARN=<copy from RoleArn output above>
      WRAPS_AWS_REGION=${AWS::Region}
      WRAPS_CONFIG_SET=wraps-email-tracking

  # DNS Records (Conditional - for domain setup)
  Route53DKIMStatus:
    Condition: HasRoute53
    Description: "Route53 DKIM records status"
    Value: "DKIM records were automatically created in your Route53 hosted zone"

  DKIMInstructions:
    Condition: HasDomain
    Description: "DKIM DNS record instructions (skip if using Route53 auto-setup)"
    Value: !Sub "Add 3 CNAME records for DKIM: Check SES console for ${Domain} identity to get the exact record values. If you provided a Route53 Hosted Zone ID, these were created automatically."

  SPFRecord:
    Condition: HasDomain
    Description: "SPF TXT record for MAIL FROM domain"
    Value: !Sub "Add TXT record at ${MailFromSubdomain}.${Domain} with value: v=spf1 include:amazonses.com ~all"

  MXRecord:
    Condition: HasDomain
    Description: "MX record for MAIL FROM domain"
    Value: !Sub "Add MX record at ${MailFromSubdomain}.${Domain} with value: 10 feedback-smtp.${AWS::Region}.amazonses.com"

  NextSteps:
    Description: "Next steps after deployment"
    Value: |
      1. Copy the RoleArn output and set it as WRAPS_AWS_ROLE_ARN in your environment
      2. Set WRAPS_AWS_REGION to the Region output value
      3. Set WRAPS_CONFIG_SET to the ConfigSetName output value
      4. If you added a domain, configure the DNS records as shown in the outputs
      5. Install the SDK: npm install @wraps.dev/email
      6. Start sending emails!
