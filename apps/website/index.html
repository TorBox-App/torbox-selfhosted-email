<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link
      rel="icon"
      type="image/png"
      href="/favicon-dark.png"
      media="(prefers-color-scheme: light)"
    >
    <link
      rel="icon"
      type="image/png"
      href="/favicon-light.png"
      media="(prefers-color-scheme: dark)"
    >
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <title>Wraps - AWS Email Pricing with Modern Developer Experience</title>
    <meta
      name="title"
      content="Wraps - AWS Email Pricing with Modern Developer Experience"
    >
    <meta
      name="description"
      content="Email shouldn't cost $4/1K. SES shouldn't take hours to configure. Wraps gives you AWS pricing ($0.10/1K emails) with the SDK and dashboard you actually want. One command deploys everything."
    >

    <!-- Canonical -->
    <link rel="canonical" href="https://wraps.dev/">

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Wraps">
    <meta
      property="og:title"
      content="Wraps - AWS Email Pricing with Modern Developer Experience"
    >
    <meta
      property="og:description"
      content="Email shouldn't cost $4/1K. SES shouldn't take hours to configure. Wraps gives you AWS pricing ($0.10/1K emails) with the SDK and dashboard you actually want. One command deploys everything."
    >
    <meta property="og:url" content="https://wraps.dev/">
    <!-- Use an absolute URL so scrapers can fetch the image reliably -->
    <meta property="og:image" content="https://wraps.dev/og-image.png">
    <meta
      property="og:image:alt"
      content="Wraps - AWS Infrastructure Wrappers Platform"
    >
    <!-- Optional: dimensions (leave generic if not exact) -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta
      name="twitter:title"
      content="Wraps - AWS Email Pricing with Modern Developer Experience"
    >
    <meta
      name="twitter:description"
      content="Email shouldn't cost $4/1K. SES shouldn't take hours to configure. Wraps gives you AWS pricing ($0.10/1K emails) with the SDK and dashboard you actually want. One command deploys everything."
    >
    <meta name="twitter:image" content="https://wraps.dev/og-image.png">
    <meta
      name="twitter:image:alt"
      content="Wraps - AWS Infrastructure Wrappers Platform"
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    >
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
