name: Deploy self-hosted

on:
  workflow_dispatch:
    inputs:
      action:
        description: "upgrade (existing instance) or deploy (first time)"
        required: true
        default: upgrade
        type: choice
        options:
          - upgrade
          - deploy

# OIDC — short-lived AWS credentials, no stored keys
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Only runs on forks — never on the upstream wraps-team/wraps repo
    if: github.repository != 'wraps-team/wraps'
    runs-on: ubuntu-latest
    environment: production # requires manual approval if configured

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Upgrades run on a fresh runner with no .env.selfhost on disk.
      # SST reads config from .env.selfhost (infra/selfhost.sst.config.ts),
      # so we reconstruct it from repository secrets before deploying.
      # BETTER_AUTH_SECRET / UNSUBSCRIBE_SECRET are the same repository secrets
      # required by the first-time deploy (generate with 'openssl rand -hex 32');
      # if you first deployed locally, copy them from .env.selfhost instead.
      - name: Reconstruct .env.selfhost (upgrade)
        if: inputs.action == 'upgrade'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WRAPS_LICENSE_KEY: ${{ secrets.WRAPS_LICENSE_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          SELFHOST_WEB_DOMAIN: ${{ vars.SELFHOST_WEB_DOMAIN }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          WRAPS_EMAIL_ROLE_ARN: ${{ secrets.WRAPS_EMAIL_ROLE_ARN }}
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
          AUTH_EMAIL_CONFIGURATION_SET: ${{ secrets.AUTH_EMAIL_CONFIGURATION_SET }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: |
          # Validate required secrets are present
          missing=()
          [ -z "${DATABASE_URL}" ]       && missing+=("DATABASE_URL")
          [ -z "${WRAPS_LICENSE_KEY}" ]  && missing+=("WRAPS_LICENSE_KEY")
          [ -z "${BETTER_AUTH_SECRET}" ] && missing+=("BETTER_AUTH_SECRET (copy from .env.selfhost after first deploy)")
          [ -z "${UNSUBSCRIBE_SECRET}" ] && missing+=("UNSUBSCRIBE_SECRET (copy from .env.selfhost after first deploy)")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for upgrade: ${missing[*]}"
            exit 1
          fi

          {
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "LICENSE_KEY=${WRAPS_LICENSE_KEY}"
            echo "BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}"
            echo "UNSUBSCRIBE_SECRET=${UNSUBSCRIBE_SECRET}"
            echo "SELFHOST_AWS_REGION=${AWS_REGION}"
            [ -n "${SELFHOST_WEB_DOMAIN}" ] && echo "SELFHOST_WEB_DOMAIN=${SELFHOST_WEB_DOMAIN}"
            [ -n "${NEXT_PUBLIC_APP_URL}" ] && echo "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}"
            [ -n "${WRAPS_EMAIL_ROLE_ARN}" ] && echo "WRAPS_EMAIL_ROLE_ARN=${WRAPS_EMAIL_ROLE_ARN}"
            [ -n "${AUTH_EMAIL_FROM}" ] && echo "AUTH_EMAIL_FROM=${AUTH_EMAIL_FROM}"
            [ -n "${AUTH_EMAIL_CONFIGURATION_SET}" ] && echo "AUTH_EMAIL_CONFIGURATION_SET=${AUTH_EMAIL_CONFIGURATION_SET}"
            [ -n "${AI_GATEWAY_API_KEY}" ] && echo "AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY}"
          } > .env.selfhost

      # First-time deploys MUST receive the auth secrets from repository
      # secrets. This runner is ephemeral — secrets generated here would die
      # with it, and regenerating UNSUBSCRIBE_SECRET on the next deploy
      # invalidates every unsubscribe token ever issued.
      - name: Validate secrets (deploy)
        if: inputs.action == 'deploy'
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
        run: |
          missing=()
          [ -z "${BETTER_AUTH_SECRET}" ] && missing+=("BETTER_AUTH_SECRET")
          [ -z "${UNSUBSCRIBE_SECRET}" ] && missing+=("UNSUBSCRIBE_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}. Generate each with 'openssl rand -hex 32' and add them under Settings → Secrets before deploying."
            exit 1
          fi

      - name: First-time deploy
        if: inputs.action == 'deploy'
        run: pnpm selfhost:deploy --yes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WRAPS_LICENSE_KEY: ${{ secrets.WRAPS_LICENSE_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Upgrade existing instance
        if: inputs.action == 'upgrade'
        run: pnpm selfhost:upgrade --yes
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
