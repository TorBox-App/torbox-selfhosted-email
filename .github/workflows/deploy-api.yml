name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - 'packages/email/**'
      - 'packages/email-check/**'
      - 'infra/**'
      - 'sst.config.ts'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  id-token: write # Required for AWS OIDC

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: ${{ github.event.inputs.stage || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @wraps/db build
          pnpm --filter @wraps/auth build
          pnpm --filter @wraps/email build
          pnpm --filter "@wraps.dev/email-check" build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove system Pulumi (SST compatibility fix)
        run: sudo rm -f /usr/local/bin/pulumi-language-nodejs

      - name: Deploy SST
        run: pnpm exec sst deploy --stage ${{ github.event.inputs.stage || 'production' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Print outputs
        run: |
          echo "Deployment complete!"
          echo "Stage: ${{ github.event.inputs.stage || 'production' }}"
