name: Release Standalone CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'CLI version to build (e.g., 2.17.7)'
        required: true

concurrency:
  group: release-standalone-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-latest
          - platform: darwin
            arch: x64
            runner: macos-15
          - platform: linux
            arch: x64
            runner: ubuntu-latest
          - platform: linux
            arch: arm64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: |
          pnpm --filter @wraps/core build
          pnpm --filter @wraps/email-check build

      - run: pnpm --filter @wraps.dev/cli build

      - name: Build standalone distribution
        run: bash scripts/build-standalone.sh --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: wraps-${{ matrix.platform }}-${{ matrix.arch }}
          path: wraps-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum wraps-*.tar.gz > CHECKSUMS.sha256

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=cli-v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" wraps-*.tar.gz CHECKSUMS.sha256 --clobber
