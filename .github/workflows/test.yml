name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Explicit permissions for security best practices
permissions:
  contents: read

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: |
          pnpm --dir packages/core build
          pnpm --dir packages/email-check build

      - name: Run type checking
        run: pnpm --dir packages/cli typecheck

      - name: Run tests
        run: pnpm --dir packages/cli test -- --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: matrix.node-version == '22.x'
        with:
          files: ./packages/cli/coverage/coverage-final.json
          flags: cli
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-api:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps
        run: |
          pnpm --filter @wraps/db build
          pnpm --filter "@wraps.dev/email-check" build

      - name: Typecheck API
        run: pnpm turbo run typecheck --filter=@wraps/api

      - name: Run API tests
        run: pnpm --filter @wraps/api test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          BETTER_AUTH_SECRET: test-secret-key-for-testing-only
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3000

  test-auth:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build auth workspace dependencies
        run: pnpm --filter "@wraps/auth^..." build

      - name: Run auth type checking
        run: pnpm --filter @wraps/auth typecheck

      - name: Run auth tests
        run: pnpm --filter @wraps/auth test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          BETTER_AUTH_SECRET: test-secret-key-for-testing-only
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_fake_key_for_ci_only
          STRIPE_WEBHOOK_SECRET: whsec_fake_secret_for_ci_only
          STRIPE_GROWTH_PRICE_ID: price_fake_growth_for_ci_only

      - name: Run email-send tests
        run: pnpm --filter @wraps/email-send test

  test-web:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web workspace dependencies
        run: pnpm --filter "@wraps/web^..." build

      - name: Run web type checking
        run: pnpm --filter @wraps/web typecheck

      - name: Run web tests
        run: pnpm --filter @wraps/web test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          BETTER_AUTH_SECRET: test-secret-key-for-testing-only
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3000

  test-db:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migration snapshot integrity
        run: pnpm --filter @wraps/db exec drizzle-kit check

      - name: Run db tests
        run: pnpm --filter @wraps/db test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  baseline:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run baseline (changed files only)
        if: github.event_name == 'pull_request'
        run: pnpm exec baseline scan --format github --changed-only .

      - name: Run baseline (full scan)
        if: github.event_name == 'push'
        run: pnpm exec baseline scan --format github .

  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm check:errors

  # Clean-clone smoke test for the self-hosted deploy path. A CI runner IS a
  # fresh customer clone — this job proves the path a fork customer follows
  # actually works without any maintainer-machine state (stale gitignored
  # dist/, hoisted binaries, lockfile drift). No AWS credentials needed: every
  # step stops before touching AWS. See project_selfhost_fresh_clone_fixes —
  # six shipped bugs were only visible from a clean clone.
  selfhost-smoke:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies (frozen, as CI deploys do)
        run: pnpm install --frozen-lockfile

      - name: Lockfile is stable on a plain install (as the docs instruct)
        run: |
          pnpm install
          git diff --exit-code pnpm-lock.yaml || {
            echo "::error::A plain 'pnpm install' rewrote pnpm-lock.yaml — a workspace package is referenced by the lockfile but not shipped in git (gitignored dir matched by a workspace glob?). Customers following the docs get a permanently dirty tree."
            exit 1
          }

      - name: Build workspace packages (what selfhost:deploy/upgrade run first)
        run: pnpm selfhost:build-deps

      - name: Dist artifacts the SST bundle imports exist
        run: |
          for f in packages/db/dist/index.js packages/core/dist/index.js packages/email-check/dist/index.js; do
            [ -f "$f" ] || { echo "::error::$f missing after selfhost:build-deps — the SST esbuild bundle will fail with 'Could not resolve' on customer machines"; exit 1; }
          done

      # SST's bundler injects the aws/sst globals into every source file
      # EXCEPT paths containing ".sst" (its platform dir check is a naive
      # substring match). A config named e.g. selfhost.sst.config.ts silently
      # gets no globals and dies at deploy with "aws is not defined".
      - name: SST config filename must not contain ".sst"
        run: |
          if ls infra/*.ts | grep -q "\.sst"; then
            echo "::error::An infra config filename contains '.sst' — SST's InjectGlobals plugin skips such paths, so aws/sst globals will be undefined at deploy time"
            exit 1
          fi

      - name: SST config builds from zero (sst install)
        working-directory: infra
        run: ../node_modules/.bin/sst install --config selfhost.config.ts --stage production --print-logs

      # Full run() evaluation — the phase sst install never reaches (it only
      # evaluates app()). Real config + real SST platform components + real
      # @pulumi/aws; only the Pulumi engine is mocked (pulumi's official
      # setMocks API). The negative control proves the harness can still
      # detect the missing-globals failure, so it can't rot into always-pass.
      - name: SST config run() evaluates (mock engine)
        run: |
          node scripts/selfhost/eval-config.mjs
          node scripts/selfhost/eval-config.mjs negative

      - name: Upgrade script boots and fails with its own guard (not a crash)
        run: |
          set +e
          output=$(pnpm exec tsx scripts/selfhost/upgrade.ts 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ $status -eq 0 ]; then
            echo "::error::upgrade.ts exited 0 with no .env.selfhost — the guard is broken"
            exit 1
          fi
          echo "$output" | grep -q ".env.selfhost not found" || {
            echo "::error::upgrade.ts failed with something other than its .env.selfhost guard — likely a broken import (missing root dep or dist artifact)"
            exit 1
          }
