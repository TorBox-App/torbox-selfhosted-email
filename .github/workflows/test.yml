name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Explicit permissions for security best practices
permissions:
  contents: read

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: |
          pnpm --dir packages/core build
          pnpm --dir packages/email-check build

      - name: Run type checking
        run: pnpm --dir packages/cli typecheck

      - name: Run tests
        run: pnpm --dir packages/cli test -- --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          files: ./packages/cli/coverage/coverage-final.json
          flags: cli
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-api:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps
        run: |
          pnpm --filter @wraps/db build
          pnpm --filter @wraps/email-check build

      - name: Run API tests
        run: pnpm --filter @wraps/api test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          BETTER_AUTH_SECRET: test-secret-key-for-testing-only
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CORS_ORIGIN: http://localhost:3000

  baseline:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run baseline (changed files only)
        if: github.event_name == 'pull_request'
        run: pnpm dlx code-baseline@1.6.0 scan --format github --changed-only .

      - name: Run baseline (full scan)
        if: github.event_name == 'push'
        run: pnpm dlx code-baseline@1.6.0 scan --format github .

  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm --dir packages/cli lint
        continue-on-error: true
